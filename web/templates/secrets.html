<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секреты - MTProxyMax</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #eee;
            --text-secondary: #bbb;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --success: #4ecca3;
            --warning: #ffc107;
            --danger: #ff4757;
            --border: #2a2a4e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--bg-card);
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        h1 span {
            color: var(--text-primary);
            font-size: 1rem;
            display: block;
            margin-top: 5px;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        nav a {
            color: var(--text-primary);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            background: var(--bg-secondary);
            transition: all 0.3s;
        }

        nav a:hover, nav a.active {
            background: var(--accent);
        }

        .card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .card h2 {
            color: var(--accent);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
        }

        .btn-success { background: var(--success); }
        .btn-success:hover { background: #3ba884; }

        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #ff6b7a; }

        .btn-warning { background: var(--warning); color: #000; }
        .btn-warning:hover { background: #ffca2c; }

        .btn-primary { background: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-sm {
            padding: 5px 12px;
            font-size: 0.85rem;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--bg-secondary);
            color: var(--accent);
            font-weight: 600;
        }

        tr:hover {
            background: var(--bg-secondary);
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-success { background: var(--success); color: #000; }
        .badge-danger { background: var(--danger); color: white; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            border: 2px solid var(--accent);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: rgba(78, 204, 163, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .secret-link {
            word-break: break-all;
            background: var(--bg-secondary);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>
                MTProxyMax
                <span>Управление секретами</span>
            </h1>
            <nav>
                <a href="/">Главная</a>
                <a href="/secrets" class="active">Секреты</a>
                <a href="/settings">Настройки</a>
                <a href="/logs">Логи</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="alert-container"></div>

        <div class="card">
            <h2>👥 Секреты доступа</h2>
            
            <div style="margin-bottom: 20px;">
                <button class="btn btn-success" onclick="showAddModal()">➕ Добавить секрет</button>
                <button class="btn btn-primary" onclick="loadSecrets()">🔄 Обновить</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Имя</th>
                        <th>Статус</th>
                        <th>Устройства</th>
                        <th>Трафик</th>
                        <th>Истекает</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="secrets-table">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 40px;">
                            Загрузка...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Модальное окно: Добавить секрет -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>➕ Добавить секрет</h3>
                <button class="modal-close" onclick="hideAddModal()">&times;</button>
            </div>
            <form id="add-form" onsubmit="addSecret(event)">
                <div class="form-group">
                    <label>Имя *</label>
                    <input type="text" id="secret-name" required placeholder="alice">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Устройства (0 = без лимита)</label>
                        <input type="number" id="secret-conns" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>IP адреса (0 = без лимита)</label>
                        <input type="number" id="secret-ips" value="0" min="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Трафик (например, 10G, 500M)</label>
                        <input type="text" id="secret-quota" value="0" placeholder="10G">
                    </div>
                    <div class="form-group">
                        <label>Срок действия (ГГГГ-ММ-ДД)</label>
                        <input type="date" id="secret-expires">
                    </div>
                </div>
                <div class="btn-group" style="margin-top: 20px;">
                    <button type="submit" class="btn btn-success">Создать</button>
                    <button type="button" class="btn btn-warning" onclick="hideAddModal()">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно: Показать ссылку -->
    <div id="link-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🔗 Ссылка на подключение</h3>
                <button class="modal-close" onclick="hideLinkModal()">&times;</button>
            </div>
            <div id="link-content"></div>
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="copyLink()">📋 Копировать</button>
                <button class="btn btn-warning" onclick="hideLinkModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <footer>
        <p>MTProxyMax v1.0.4 | &copy; 2026 SamNet Technologies</p>
    </footer>

    <script>
        const API_BASE = '/api';
        let currentLink = '';

        // Утилиты
        function showAlert(message, type = 'success') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
            
            const container = document.getElementById('alert-container');
            container.insertBefore(alert, container.firstChild);
            
            setTimeout(() => alert.remove(), 5000);
        }

        async function apiRequest(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers,
                    },
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Ошибка запроса');
                }
                
                return await response.json();
            } catch (error) {
                showAlert(error.message, 'error');
                throw error;
            }
        }

        // Загрузка секретов
        async function loadSecrets() {
            try {
                const data = await apiRequest('/secrets');
                const tbody = document.getElementById('secrets-table');
                
                if (data.secrets.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">Секретов нет</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.secrets.map(secret => `
                    <tr>
                        <td><strong>${escapeHtml(secret.label)}</strong></td>
                        <td>
                            <span class="badge ${secret.enabled ? 'badge-success' : 'badge-danger'}">
                                ${secret.enabled ? 'Активен' : 'Отключен'}
                            </span>
                        </td>
                        <td>${secret.max_conns > 0 ? secret.max_conns : '∞'}</td>
                        <td>${formatQuota(secret.quota)}</td>
                        <td>${secret.expires !== '0' ? secret.expires : '∞'}</td>
                        <td>
                            <div class="actions">
                                <button class="btn btn-sm btn-primary" onclick="showLink('${secret.label}')">🔗</button>
                                <button class="btn btn-sm btn-success" onclick="toggleSecret('${secret.label}', ${!secret.enabled})">${secret.enabled ? '⏸️' : '▶️'}</button>
                                <button class="btn btn-sm btn-warning" onclick="rotateSecret('${secret.label}')">🔄</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteSecret('${secret.label}')">🗑️</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading secrets:', error);
            }
        }

        // Добавление секрета
        function showAddModal() {
            document.getElementById('add-modal').classList.add('active');
        }

        function hideAddModal() {
            document.getElementById('add-modal').classList.remove('active');
            document.getElementById('add-form').reset();
        }

        async function addSecret(event) {
            event.preventDefault();
            
            const label = document.getElementById('secret-name').value;
            const conns = parseInt(document.getElementById('secret-conns').value) || 0;
            const ips = parseInt(document.getElementById('secret-ips').value) || 0;
            const quota = document.getElementById('secret-quota').value || '0';
            const expires = document.getElementById('secret-expires').value || '0';
            
            try {
                await apiRequest('/secrets', {
                    method: 'POST',
                    body: JSON.stringify({ label, max_conns: conns, max_ips: ips, quota, expires })
                });
                
                showAlert(`Секрет '${label}' создан`);
                hideAddModal();
                loadSecrets();
            } catch (error) {
                // Ошибка уже показана
            }
        }

        // Показать ссылку
        async function showLink(label) {
            try {
                const data = await apiRequest(`/secrets/${label}/link`);
                currentLink = data.link;
                
                document.getElementById('link-content').innerHTML = `
                    <p><strong>${escapeHtml(label)}:</strong></p>
                    <div class="secret-link">${escapeHtml(data.link)}</div>
                `;
                
                document.getElementById('link-modal').classList.add('active');
            } catch (error) {
                // Ошибка уже показана
            }
        }

        function hideLinkModal() {
            document.getElementById('link-modal').classList.remove('active');
        }

        function copyLink() {
            navigator.clipboard.writeText(currentLink).then(() => {
                showAlert('Ссылка скопирована');
            });
        }

        // Включить/отключить
        async function toggleSecret(label, enable) {
            try {
                await apiRequest(`/secrets/${label}/${enable ? 'enable' : 'disable'}`, {
                    method: 'POST'
                });
                showAlert(`Секрет '${label}' ${enable ? 'включён' : 'отключён'}`);
                loadSecrets();
            } catch (error) {
                // Ошибка уже показана
            }
        }

        // Обновить ключ
        async function rotateSecret(label) {
            if (!confirm(`Обновить ключ для '${label}'?\n\nСтарая ссылка перестанет работать.`)) {
                return;
            }
            
            try {
                await apiRequest(`/secrets/${label}/rotate`, {
                    method: 'POST'
                });
                showAlert(`Ключ для '${label}' обновлён`);
                loadSecrets();
            } catch (error) {
                // Ошибка уже показана
            }
        }

        // Удалить
        async function deleteSecret(label) {
            if (!confirm(`Удалить секрет '${label}'?\n\nЭто действие нельзя отменить.`)) {
                return;
            }
            
            try {
                await apiRequest(`/secrets/${label}`, {
                    method: 'DELETE'
                });
                showAlert(`Секрет '${label}' удалён`);
                loadSecrets();
            } catch (error) {
                // Ошибка уже показана
            }
        }

        // Форматирование
        function formatQuota(quota) {
            if (!quota || quota === '0') return '∞';
            
            const bytes = parseInt(quota);
            if (isNaN(bytes)) return quota;
            
            if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
            if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return bytes + ' B';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', loadSecrets);
    </script>
</body>
</html>
