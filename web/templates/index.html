<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - MTProxyMax</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #eee;
            --text-secondary: #bbb;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --success: #4ecca3;
            --warning: #ffc107;
            --danger: #ff4757;
            --border: #2a2a4e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--bg-card);
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        h1 span {
            color: var(--text-primary);
            font-size: 1rem;
            display: block;
            margin-top: 5px;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        nav a {
            color: var(--text-primary);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            background: var(--bg-secondary);
            transition: all 0.3s;
        }

        nav a:hover, nav a.active {
            background: var(--accent);
        }

        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .status-card h3 {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .status-card .value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .status-card .value.running { color: var(--success); }
        .status-card .value.stopped { color: var(--danger); }

        .card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .card h2 {
            color: var(--accent);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
        }

        .btn-success { background: var(--success); }
        .btn-success:hover { background: #3ba884; }

        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #ff6b7a; }

        .btn-warning { background: var(--warning); color: #000; }
        .btn-warning:hover { background: #ffca2c; }

        .btn-primary { background: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-sm {
            padding: 5px 12px;
            font-size: 0.85rem;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--bg-secondary);
            color: var(--accent);
            font-weight: 600;
        }

        tr:hover {
            background: var(--bg-secondary);
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-success { background: var(--success); color: #000; }
        .badge-danger { background: var(--danger); color: white; }
        .badge-warning { background: var(--warning); color: #000; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            border: 2px solid var(--accent);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: rgba(78, 204, 163, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .logs {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .logs line {
            display: block;
            padding: 3px 0;
            border-bottom: 1px solid var(--border);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .engine-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .secret-link {
            word-break: break-all;
            background: var(--bg-secondary);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>
                MTProxyMax
                <span>Веб-интерфейс управления прокси</span>
            </h1>
            <nav>
                <a href="/" class="active">Главная</a>
                <a href="/secrets">Секреты</a>
                <a href="/settings">Настройки</a>
                <a href="/logs">Логи</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="app">
            <!-- Контент загружается через JavaScript -->
        </div>
    </main>

    <footer>
        <p>MTProxyMax v1.0.4 | &copy; 2026 SamNet Technologies</p>
    </footer>

    <script>
        const API_BASE = '/api';

        // Утилиты
        function showLoading() {
            document.getElementById('app').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Загрузка...</p>
                </div>
            `;
        }

        function showAlert(message, type = 'success') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
            
            const container = document.querySelector('.container');
            container.insertBefore(alert, container.firstChild);
            
            setTimeout(() => alert.remove(), 5000);
        }

        async function apiRequest(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers,
                    },
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Ошибка запроса');
                }
                
                return await response.json();
            } catch (error) {
                showAlert(error.message, 'error');
                throw error;
            }
        }

        // Главная страница
        async function renderDashboard() {
            showLoading();
            
            try {
                const status = await apiRequest('/status');
                
                document.getElementById('app').innerHTML = `
                    <div class="status-bar">
                        <div class="status-card">
                            <h3>Статус движка</h3>
                            <div class="value ${status.engine.running ? 'running' : 'stopped'}">
                                ${status.engine.running ? '● Запущен' : '● Остановлен'}
                            </div>
                        </div>
                        <div class="status-card">
                            <h3>Порт</h3>
                            <div class="value">${status.settings.port}</div>
                        </div>
                        <div class="status-card">
                            <h3>Домен</h3>
                            <div class="value" style="font-size: 1.2rem;">${status.settings.domain}</div>
                        </div>
                        <div class="status-card">
                            <h3>Секреты</h3>
                            <div class="value">${status.active_secrets_count} / ${status.secrets_count}</div>
                        </div>
                    </div>

                    <div class="card">
                        <h2>🚀 Управление движком</h2>
                        <div class="engine-controls">
                            ${!status.engine.running ? `
                                <button class="btn btn-success" onclick="startEngine()">Запустить</button>
                            ` : `
                                <button class="btn btn-warning" onclick="restartEngine()">Перезапустить</button>
                                <button class="btn btn-danger" onclick="stopEngine()">Остановить</button>
                            `}
                        </div>
                        <p style="margin-top: 15px; color: var(--text-secondary);">
                            Версия: ${status.engine.version} | PID: ${status.engine.pid || '—'}
                        </p>
                    </div>

                    <div class="card">
                        <h2>📊 Быстрая статистика</h2>
                        <table>
                            <tr>
                                <th>Параметр</th>
                                <th>Значение</th>
                            </tr>
                            <tr>
                                <td>Всего секретов</td>
                                <td>${status.secrets_count}</td>
                            </tr>
                            <tr>
                                <td>Активных секретов</td>
                                <td>${status.active_secrets_count}</td>
                            </tr>
                            <tr>
                                <td>Порт прокси</td>
                                <td>${status.settings.port}</td>
                            </tr>
                            <tr>
                                <td>FakeTLS домен</td>
                                <td>${status.settings.domain}</td>
                            </tr>
                            <tr>
                                <td>Маскировка</td>
                                <td>
                                    <span class="badge ${status.settings.masking_enabled ? 'badge-success' : 'badge-danger'}">
                                        ${status.settings.masking_enabled ? 'Включена' : 'Отключена'}
                                    </span>
                                </td>
                            </tr>
                        </table>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        // Управление движком
        async function startEngine() {
            try {
                await apiRequest('/engine/start', { method: 'POST' });
                showAlert('Движок запущен');
                setTimeout(renderDashboard, 1000);
            } catch (error) {}
        }

        async function stopEngine() {
            try {
                await apiRequest('/engine/stop', { method: 'POST' });
                showAlert('Движок остановлен');
                setTimeout(renderDashboard, 1000);
            } catch (error) {}
        }

        async function restartEngine() {
            try {
                await apiRequest('/engine/restart', { method: 'POST' });
                showAlert('Движок перезапущен');
                setTimeout(renderDashboard, 1000);
            } catch (error) {}
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', renderDashboard);
    </script>
</body>
</html>
